name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  code-review-checks:
    name: Code Review — Type & Test Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git diff vs base

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Type check — changed files only (mypy strict)
        run: |
          python .github/scripts/code_review.py \
            --base ${{ github.base_ref }} \
            --type-only \
            --strict \
            --github-annotations

      - name: Test suite review — changed files only
        run: |
          python .github/scripts/code_review.py \
            --base ${{ github.base_ref }} \
            --test-only \
            --missing \
            --review-format

      - name: Full master review report
        run: |
          python .github/scripts/code_review.py \
            --base ${{ github.base_ref }} \
            --review-format || true
        continue-on-error: true

  quality-gates:
    name: Quality Gates (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: operational-core
            path: life-ops/operational/packages/core
            python: "3.11"
          - package: operational-cli
            path: life-ops/operational/apps/cli
            python: "3.11"
          - package: operational-tui
            path: life-ops/operational/apps/tui
            python: "3.11"
          - package: vibe-ops
            path: vibe-ops
            python: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}

      - name: Run quality gates (${{ matrix.package }})
        working-directory: ${{ matrix.path }}
        run: |
          uv sync --all-packages
          uv run ruff check src/
          uv run ruff format --check src/
          uv run mypy src/
          uv run pytest -m "not e2e"

  operational-e2e:
    name: Operational E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: astral-sh/setup-uv@v4
      - working-directory: life-ops/operational
        run: |
          uv sync
          uv run pytest -m e2e

  operational-scratch:
    name: Vibe-ops Scratch Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: astral-sh/setup-uv@v4
      - name: Verify vibe-ops model imports
        run: |
          cd vibe-ops && uv sync && uv run python verify_mesh.py

  git-hooks:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: astral-sh/setup-uv@v4
      - working-directory: life-ops/operational
        run: uv run pre-commit run --all-files
