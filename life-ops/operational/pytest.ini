[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --showlocals
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (storage + pipeline)
    e2e: End-to-end tests (CLI invocation)
    property: Property-based tests (Hypothesis)
    slow: Slow tests (>1s)
filterwarnings =
    ignore::DeprecationWarning:frontmatter
