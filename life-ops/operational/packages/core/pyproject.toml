[project]
name = "operational-core"
version = "0.1.0"
description = "PAV-OS core: entities, business logic, persistence"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10,<2.14",
    "python-frontmatter>=1.1,<2.0",
    "pyyaml>=6.0,<7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/operational"]

[tool.hatch.build.targets.sdist]
include = ["src/operational"]
