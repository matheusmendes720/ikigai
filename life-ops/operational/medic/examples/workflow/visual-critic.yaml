# visual-critic — full MiniMax-VL-01 + agentic swarm loop
#
# This workflow is the canonical "active visual criticism" pipeline:
#
#   1. Run the project's health gate (tests/lint/coverage).
#   2. Capture a TUI frame.
#   3. Send the frame to MiniMax-VL-01 (via mmx) for critique.
#   4. Combine code findings + vision findings into a single report.
#   5. Post the report as a PR review (only if health.ok AND vision_score >= 60).
#
# Variants for "swarm" use:
#   - Duplicate the `critique` step with different frames to get N critics
#     in parallel (the workflow engine currently runs serially; parallel-
#     fan-out is on the roadmap).
#   - Use the `parallel_with` field on multiple critique steps to declare
#     siblings that should be aggregated together.
#   - The `medic vision critique` CLI can be called directly to test a
#     single frame before launching the swarm.
#
# Required env:
#   MINIMAX_API_KEY=<your key>
#   PATH must include the mmx binary (install with scripts/install_mmx.sh).
#
# Run with:
#   medic workflow run examples/workflow/visual-critic.yaml \
#     --target ../packages/core \
#     --verbose

name: visual-critic
description: |
  Health gate → TUI capture → MiniMax-VL-01 critique → combined report →
  conditional post to GitHub.

defaults:
  timeout: 5m
  retries: 1

steps:
  # -----------------------------------------------------------------------
  # 1. Verify the project's health gate (test/lint/coverage/deps/complexity).
  #    A failing health gate aborts the swarm — we don't ship visual fixes
  #    on top of broken code.
  # -----------------------------------------------------------------------
  - id: health
    use: health.run
    args:
      target: "{{ .target }}"

  # -----------------------------------------------------------------------
  # 2. Sanity-check that MiniMax is wired up. If mmx is missing or the API
  #    key isn't set, this fails — and the `when:` on the critique step
  #    below causes it to be skipped rather than crashing the workflow.
  # -----------------------------------------------------------------------
  - id: vision_doctor
    use: local.run_cmd
    args:
      dir: "{{ .target }}"
      cmd: "medic vision doctor"

  # -----------------------------------------------------------------------
  # 3. Capture a single TUI frame from the project's TUI binary. This
  #    is the "candidate" frame we're going to critique.
  # -----------------------------------------------------------------------
  - id: capture
    use: local.run_cmd
    args:
      dir: "{{ .target }}"
      cmd: "medic visualize --binary {{ .tui_binary }} --cols 120 --rows 40 --max-frames 1 --headless"

  # -----------------------------------------------------------------------
  # 4. Send the captured frame to MiniMax-VL-01 via the mmx CLI. Uses the
  #    prompt file at configs/medic/promts/visual-critic.txt so the model
  #    follows our markdown schema exactly.
  #
  #    Guard: only run if the vision_doctor step succeeded.
  # -----------------------------------------------------------------------
  - id: critique
    when: '{{ .steps.vision_doctor.ok }}'
    use: vision.critique
    args:
      path:       "{{ .frames_dir }}/000000.svg"
      prompt_file: "configs/medic/promts/visual-critic.txt"
      model:      "minimax-vl-01"
      timeout_ms: 90000
      out:        ".medic/vision/critique.json"

  # -----------------------------------------------------------------------
  # 5. Run code-pattern scan on the target. This complements the vision
  #    critique with structural findings (TODO markers, debug prints,
  #    hardcoded paths).
  # -----------------------------------------------------------------------
  - id: patterns
    use: pattern.scan
    args:
      target: "{{ .target }}"
      family: "code"

  # -----------------------------------------------------------------------
  # 6. Synthesise a markdown report combining everything.
  # -----------------------------------------------------------------------
  - id: report
    use: report.write
    args:
      path: ".medic/visual-critic-report.md"
      body: |
        # Visual Critic Report

        _generated by medic 🩺 + MiniMax-VL-01_

        ## Health
        Score: {{ .steps.health.output.score }}/100 (ok={{ .steps.health.output.ok }})

        ## Vision Critique
        {{ .steps.critique.output | tojson }}

        ## Code Patterns
        {{ .steps.patterns.output | tojson }}

  # -----------------------------------------------------------------------
  # 7. Post the report as a PR review — but only if both gates pass.
  #    Verdict = REQUEST_CHANGES if vision_score < 50, COMMENT if < 80,
  #    APPROVE otherwise.
  # -----------------------------------------------------------------------
  - id: post
    when: '{{ .steps.health.ok }}'
    use: github.post_review
    args:
      number: "{{ .pr_number }}"
      event:  "COMMENT"
      body_file: ".medic/visual-critic-report.md"
