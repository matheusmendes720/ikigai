target-version = "py311"
line-length = 100
extend-exclude = ["**/__pycache__", ".venv", "build", "dist", "tests/fixtures"]

[lint]
select = ["ALL"]
ignore = [
    "D203",
    "D213",
    "COM812",
    "ISC001",
    "G004",
    "TRY003",
    "PLC0415",   # late imports intentional in CLI command subcommands
]

[lint.per-file-ignores]
"src/operational/types.py" = [
    "A002",      # `id` builtin shadowing is required by the Repository spec
    "ANN401",    # `**fields: Any` is the correct Logger protocol shape
]
"tests/**/*.py" = [
    "S101",      # asserts
    "PLR2004",   # magic values
    "ARG",       # unused args
    "FBT",       # booleans as args
    "PT011",     # raises in except
    "SLF001",    # private access
    "ANN",       # annotations
    "A002",      # id builtin shadowing in fake repos
    "D102",      # missing docstring on test methods
    "DTZ001",    # datetime() without tzinfo in tests
    "DTZ005",    # datetime.now() without tz in tests
    "DTZ011",    # date.today() in tests
    "I001",      # unsorted imports
    "N802",      # function name casing (test_T_xxx)
    "PLC0415",   # inline imports in tests
    "SIM300",    # yoda conditions in tests
]
"**/__init__.py" = ["F401"]
"scripts/**" = ["T201", "INP001", "EXE001"]
"packages/core/src/operational/analytics/**" = [
    "C901",       # complex analytics functions — intentional
    "PLR0912",    # many branches in narrative/complexity functions
    "D101",      # TypedDicts don't need class docstrings
    "D103",      # internal analytics helpers
    "E501",      # Rich table formatting can't always split
    "PLR2004",   # magic values are intentional in analytics
    "F841",      # intermediate computation vars
    "C401",      # set comprehension noise
    "RUF001",    # sigma/sigma symbols in stats output
    "ARG001",    # unused args in analytics helpers
    "ANN401",    # Any in internal helpers
    "PLR0915",   # weekly_digest needs all domain rows
    "PERF401",   # list comprehension style
    "RUF015",    # complex slice expression
    "F821",      # false positive undefined
    "B905",      # zip strict
    "PLR0913",   # too many args
    "B007",      # loop var naming
]
"apps/cli/src/operational/cli/commands/analytics_cmd.py" = [
    "D101",      # TypedDict classes
    "D103",      # internal render helpers
    "E501",      # Rich table/panel formatting
    "PLR2004",   # magic values intentional
    "F841",      # intermediate display variables
    "RUF001",    # sigma/sigma symbols in stats
    "ARG001",    # unused render helper args
    "C401",      # set comprehension noise
    "ANN401",    # Any in _safe_grid_val
    "PLR0915",   # render_overview intentionally comprehensive
    "PERF401",   # list.extend noise
    "DTZ005",    # datetime.now in report generation
    "E741",      # ambiguous l in comprehension
    "FBT001",    # parse_bool intentional bool param
    "RUF015",    # complex slice expression
    "F821",      # undefined name - false positive
    "B905",      # zip strict parameter
    "PLR0913",   # weekly_digest needs all domain rows
    "B007",      # loop variable naming
    "E402",      # intentional import grouping after top-level constants
    "E703",      # statement end with semicolon
]
"apps/cli/src/operational/cli/commands/habit_cmd.py" = [
    "E501",      # Rich table/panel formatting
    "PLR2004",   # magic values intentional
    "F841",      # intermediate display variables
    "C901",      # habit_stats intentionally comprehensive
    "PLR0915",   # habit_stats needs all domain rows
    "PLR0912",   # habit_stats many branches
    "DTZ005",    # date.today() in CLI commands
    "DTZ011",
    "E741",      # ambiguous l in comprehension
    "FBT001",    # parse_bool intentional bool param
    "B008",      # typer defaults
    "FBT003",    # typer boolean option call
    "PLC0415",   # intentional late imports in subcommands
    "N806",      # GOOD/OK constant naming in stats
    "RUF100",    # noqa directives
]
"apps/cli/src/operational/cli/commands/lunch_cmd.py" = [
    "E501",      # Rich table/panel formatting
    "PLR2004",   # magic values intentional
    "DTZ005",    # date.today() in CLI commands
    "DTZ011",
    "E741",      # ambiguous l in comprehension
    "FBT001",    # parse_bool intentional bool param
    "B008",      # typer defaults
    "PLC0415",   # intentional late imports
    "PLR0913",   # lunch.create needs all domain args
    "FBT003",    # typer boolean option call
]

# TUI screens — Textual Screen methods (compose, on_mount, action_*) don't need docstrings
"apps/tui/src/operational/tui/screens/*.py" = [
    "D102",      # Textual Screen lifecycle methods
    "D103",      # private helper functions in screens
    "PLR2004",   # magic threshold values (7.5, 6.5, 7, 5, 80, 50) intentional
    "BLE001",    # blind except for graceful degradation in TUI refresh
    "S110",      # try-except-pass for graceful degradation
    "DTZ011",    # date.today() in TUI refresh loops
    "ARG001",    # unused args in helper functions
    "E501",      # Rich/Textual formatting lines
    "RUF002",    # math formula uses proper minus sign (−) not hyphen
    "Q003",      # quote style in notify() calls
    "I001",      # import order — pre-existing across all screen files
    "TC003",     # TYPE_CHECKING import order — pre-existing
    "ANN001",    # missing type annotation on private helper args
    "PERF401",   # for-loop to build list — intentional in analytics_screen
    "PLR0915",   # _refresh has many statements — intentional in analytics_screen
    "F401",      # unused imports in screen files (pre-existing)
]

# TUI widgets — Reactive widgets with watch_* methods
"apps/tui/src/operational/tui/widgets/*.py" = [
    "D102",      # Textual Reactive widget methods
    "D107",      # __init__ in widget classes
    "ARG002",    # unused watch method args (old/new required by Textual)
    "ANN003",    # **kwargs in Textual Widget.__init__
    "PLR0913",   # too many args in KPICard.__init__ (Textual super call)
    "A002",      # `id` shadowing builtin in KPICard (Textual DOM id param)
    "PLR2004",   # magic threshold values in habit_streak / pomodoro_grid
    "RUF002",    # × (multiplication sign) in pomodoro_grid docstring
    "C901",      # subplot() complexity — intentional plotext wrapper
    "PLR0912",   # subplot() many branches — intentional plotext wrapper
]

# TUI app.py — PAVApp is a Textual App subclass, its action_ methods don't need docstrings
"apps/tui/src/operational/tui/app.py" = [
    "D102",      # Textual Screen lifecycle / action methods
    "D107",      # __init__ in PAVApp
    "FBT001",    # boolean positional args in Textual App.__init__
    "FBT002",    # boolean default positional args
]

# CLI app.py — Typer/CLI layer, pre-existing import order and bool-option patterns
"apps/cli/src/operational/cli/app.py" = [
    "I001",      # import order — pre-existing
    "PLC0414",   # analytics_app alias — pre-existing
    "FBT001",    # Typer boolean options
    "FBT003",    # Typer boolean option calls
    "SIM105",    # try-except-pass in _auto_load_dataset
    "S110",      # try-except-pass for silent fallback
]

# CLI state.py — _auto_load_dataset silent fallback pattern
"apps/cli/src/operational/cli/state.py" = [
    "SIM105",    # try-except-pass for silent fallback
    "S110",      # try-except-pass for silent fallback
]

# CLI dataset_selector.py — DatasetRef dataclass
"apps/cli/src/operational/cli/dataset_selector.py" = [
    "D101",      # DatasetRef dataclass — intentional brief class
    "D413",      # last-section blank line — intentional compact docstring
]

# TUI navigation.py — tiny state module
"apps/tui/src/operational/tui/navigation.py" = [
    "D101",      # ScreenKind/TUIState dataclass enums
    "D103",      # get_state / set_state / navigate_to helpers
    "E501",      # SCREEN_MAP string-dict line length
    "PLW0603",   # global _state — intentional TUI state singleton
]

# TUI theme.py — theme factory function
"apps/tui/src/operational/tui/theme.py" = [
    "D103",      # get_tui_theme() helper
]

# TUI chart helpers — plotext wrappers
"apps/tui/src/operational/tui/charts.py" = [
    "D103",      # chart helper functions
    "E501",      # function signature line length
]


[lint.pydocstyle]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
