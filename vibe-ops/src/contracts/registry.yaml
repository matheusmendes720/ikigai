# Schema Registry — vibe-ops Data-Mesh Contract Catalog
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Mapeia: domain.product.version → contract YAML path + metadados
# Regra: breaking change = versão nova. Nunca mutação silenciosa.
# Ref: ADR-001 §2.1 (Schema-First), ADR-002 §Q1
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

registry_version: "1.0.0"
updated_at: "2026-05-09"

domains:
  planning:
    description: "Metadados YAML de arquivos Markdown (sonhos, objetivos, metas, tarefas)"
    owner: "humano"
    source_of_truth: "Markdown + YAML Frontmatter"
    products:
      entities:
        versions:
          v1:
